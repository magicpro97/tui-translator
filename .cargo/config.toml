# ─────────────────────────────────────────────────────────────────────────────
# .cargo/config.toml — project-level Cargo configuration
#
# Issue #90 (WP-14.01): When building with the x86_64-pc-windows-msvc target,
# link the Visual C++ Runtime statically so the resulting .exe does not depend
# on the VC++ runtime DLLs and can be copied to any Windows 10/11 machine and
# run without a separate VC Redist installation.
#
# How to build a self-contained release executable:
#   cargo build --release --target x86_64-pc-windows-msvc
#
# The RUSTFLAGS below are applied only to the msvc target; GNU and other
# targets are unaffected.
# ─────────────────────────────────────────────────────────────────────────────

[target.x86_64-pc-windows-msvc]
# +crt-static: statically link the MSVC/UCRT runtime components that Rust and
# native dependencies would otherwise load from vcruntime/msvcp/ucrtbase DLLs.
# This avoids requiring the end-user to install the VC++ Redistributable.
#
# legacy_stdio_definitions.lib: resolves __imp_fgetpos, __imp_fsetpos,
# __imp_rand, __imp__aligned_malloc etc. that whisper_rs_sys (built with /MD
# via the cc crate) references as DLL imports while the Rust side uses /MT.
# See: https://docs.microsoft.com/en-us/cpp/c-runtime-library/potential-errors-passing-crt-objects-across-dll-boundaries
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-arg=legacy_stdio_definitions.lib"]
