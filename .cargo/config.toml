# ─────────────────────────────────────────────────────────────────────────────
# .cargo/config.toml — project-level Cargo configuration
#
# Issue #90 (WP-14.01): When building with the x86_64-pc-windows-msvc target,
# link the Visual C++ Runtime statically so the resulting .exe has zero DLL
# dependencies and can be copied to any Windows 10/11 machine and run without
# a separate VC Redist installation.
#
# How to build a self-contained release executable:
#   cargo build --release --target x86_64-pc-windows-msvc
#
# The RUSTFLAGS below are applied only to the msvc target; GNU and other
# targets are unaffected.
# ─────────────────────────────────────────────────────────────────────────────

[target.x86_64-pc-windows-msvc]
# +crt-static: link the MSVC C Runtime (msvcrt) statically into the binary.
# This eliminates the vcruntime140.dll / msvcp140.dll dependency that would
# otherwise require the end-user to install the VC++ Redistributable.
rustflags = ["-C", "target-feature=+crt-static"]
