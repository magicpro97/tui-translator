# ─────────────────────────────────────────────────────────────────────────────
# .cargo/config.toml — project-level Cargo configuration
#
# Issue #90 (WP-14.01): When building with the x86_64-pc-windows-msvc target,
# link the Visual C++ Runtime statically so the resulting .exe does not depend
# on the VC++ runtime DLLs and can be copied to any Windows 10/11 machine and
# run without a separate VC Redist installation.
#
# How to build a self-contained release executable:
#   cargo build --release --target x86_64-pc-windows-msvc
#
# The RUSTFLAGS below are applied only to the msvc target; GNU and other
# targets are unaffected.
# ─────────────────────────────────────────────────────────────────────────────

[target.x86_64-pc-windows-msvc]
# +crt-static: statically link the MSVC/UCRT runtime components that Rust and
# native dependencies would otherwise load from vcruntime/msvcp/ucrtbase DLLs.
# This avoids requiring the end-user to install the VC++ Redistributable.
#
# ucrt.lib: whisper_rs_sys 0.10 bundles whisper.cpp 1.6.2 which is compiled by
# cmake without CMAKE_MSVC_RUNTIME_LIBRARY, so it uses /MD (DLL CRT) regardless
# of our +crt-static flag.  This generates __imp_fgetpos, __imp__aligned_malloc,
# __imp_rand, __imp_strncpy, __imp_strdup, __imp_fmaxf etc. that the static UCRT
# (libucrt.lib) does not provide.  Linking ucrt.lib (the UCRT DLL import library)
# alongside libucrt.lib satisfies those __imp_* symbols via ucrtbase.dll, which is
# a universal system DLL present on all Windows 10/11 machines.  Since whisper.cpp
# handles its own memory internally (no cross-boundary malloc/free with Rust), the
# mixed-CRT usage is safe in practice for this dependency.
rustflags = ["-C", "target-feature=+crt-static", "-C", "link-arg=ucrt.lib"]
