# Minimal cargo-deny policy for tui-translator release evidence.
#
# This project is Windows-native, so dependency checks are scoped to Windows
# targets to avoid Linux/macOS audio backends that are not shipped.
[graph]
targets = [
    "x86_64-pc-windows-gnu",
    "x86_64-pc-windows-msvc",
]
all-features = false

[advisories]
yanked = "deny"
# Transitive dependencies of mistralrs-core that are unmaintained but have
# no known security advisories.  These are optional-feature-only deps
# (local-llm-mt feature) and will be removed if upstream drops them.
ignore = [
    # fxhash — fast non-crypto hash used internally by mistralrs-core
    { id = "RUSTSEC-2025-0057", reason = "no CVE; mistralrs-core transitive dep; local-llm-mt feature only" },
    # number_prefix — terminal progress bar dep via indicatif
    { id = "RUSTSEC-2025-0119", reason = "no CVE; indicatif transitive dep; local-llm-mt feature only" },
    # paste — proc-macro, no runtime risk
    { id = "RUSTSEC-2024-0436", reason = "no CVE; candle-core transitive dep; local-llm-mt feature only" },
]

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
