# Minimal cargo-deny policy for tui-translator release evidence.
#
# This project is Windows-native, so dependency checks are scoped to Windows
# targets to avoid Linux/macOS audio backends that are not shipped.
[graph]
targets = [
    "x86_64-pc-windows-gnu",
    "x86_64-pc-windows-msvc",
]
all-features = false

[advisories]
# RUSTSEC-2026-0009 — DoS via stack exhaustion in `time` parsing.
# Fixed upstream in time 0.3.47, but that release bumps the required
# rustc to 1.88, which is higher than this repo's current MSRV gate of
# 1.86 (see `.github/workflows/ci.yml` → "MSRV (Rust 1.86) build").
# tui-translator does not parse untrusted external date strings: time
# is only used internally for timestamps and metrics, so the stack-
# exhaustion path is not reachable from user/network input. The
# advisory will be cleared on the next MSRV bump (tracked under
# `docs/security/supply-chain.md` §1 promotion criteria).
ignore = [
    { id = "RUSTSEC-2026-0009", reason = "Not reachable: tui-translator does not parse untrusted date strings; fix requires MSRV bump to 1.88." },
]
yanked = "deny"

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
