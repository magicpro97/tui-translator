# Minimal cargo-deny policy for tui-translator release evidence.
#
# This project is Windows-native, so dependency checks are scoped to Windows
# targets to avoid Linux/macOS audio backends that are not shipped.
[graph]
targets = [
    "x86_64-pc-windows-gnu",
    "x86_64-pc-windows-msvc",
]
all-features = false

[advisories]
ignore = []
yanked = "deny"

[licenses]
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
