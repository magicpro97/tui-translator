name: Windows gate

# WP-25.06 (#837): the 6 gate jobs (Format, Test default, Test release,
# Coverage, Module-size, Panic-sites) used to be pinned to
# `runs-on: [self-hosted, Windows]` so they could verify the
# Windows COM teardown fix on a real Windows machine (WP-24, #723).
#
# That work is done and shipped (see #755 and .hermes/plans/2026-06-13
# -windows-teardown-decision.md). The remaining purpose of this file is
# to enforce engineering standards on every PR:
#   * rustfmt formatting
#   * cargo test --bins (debug + release)
#   * aggregate coverage >= 60% on the v1-critical layers
#   * per-file 100% line+branch coverage on the v1-critical files
#     touched by the PR
#   * module size <= 1000 LOC per file (with the 4 baseline files
#     tracked for refactor in #483 waived via .standards-waivers.txt)
#   * panic-prone site count in src/main.rs < 50
#
# None of these gates need a self-hosted runner. We moved them to
# `windows-latest` (GitHub-hosted) so that an offline self-hosted
# runner cannot block PR merge status indefinitely -- the bug filed in
# #837 (5/6 jobs queued with `runner_name=null` for > 3h).

on:
  push:
    branches:
      - "fix/**"
      - "ci/**"
  pull_request:
    branches:
      - "fix/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: Format check
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt --check
        shell: pwsh
        run: cargo fmt --all -- --check

  test-default:
    name: Test (default features, debug)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test --bins
        # NOTE: deliberately NO --test-threads=1, NO continue-on-error.
        # If the COM guard fix is in place the binary must exit 0 cleanly.
        # Any STATUS_ACCESS_VIOLATION (0xC0000005) or exit code 1 fails the job.
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          cargo test --bins -- --nocapture --skip real_api

  test-release:
    name: Test (release build, smoke)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: cargo test --release --bins
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          cargo test --release --bins -- --nocapture --skip real_api

  # WP-25.04 (#762): coverage gate for the v1-critical layers.
  #
  # We run with --no-cfg-coverage so the build does not pull
  # libclang (whisper-rs-sys).  Trade-off: the coverage map is
  # missing the local-stt feature, which is a known gap noted
  # in the gate's plan.
  #
  # Threshold is 60% (the audit's estimate).  The branch
  # threshold matches the line threshold by default.  Both can
  # be tightened later when the baseline moves up.
  coverage-gate:
    name: Coverage gate (v1-critical layers)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install rust toolchain with llvm-tools-preview
        shell: pwsh
        run: |
          rustup component add llvm-tools-preview 2>&1 | Out-Null
          cargo install cargo-llvm-cov --locked --quiet 2>&1 | Out-Null
      - name: Generate lcov.info
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          New-Item -ItemType Directory -Force -Path target/evidence | Out-Null
          cargo llvm-cov --no-cfg-coverage --no-default-features --features local-mt --bins --lcov --output-path target/evidence/lcov.info
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::cargo llvm-cov exited with $LASTEXITCODE"
            exit $LASTEXITCODE
          }
      - name: Enforce coverage gate
        shell: pwsh
        run: |
          python3 scripts/ci/coverage_gate.py --lcov target/evidence/lcov.info --threshold 60.0
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::coverage gate failed; see log above for the per-file breakdown"
            exit $LASTEXITCODE
          }
      - name: Per-file 100% gate (changed v1-critical files)
        shell: pwsh
        run: |
          # Get the list of files changed by the PR (relative paths).
          $changed = (git diff --name-only origin/${{ github.base_ref }}...HEAD) | Where-Object { $_ -and $_ -notmatch '^tests/' -and $_ -notmatch '^\.github/' -and $_ -notmatch '^scripts/' -and $_ -notmatch '^\.hermes/' -and $_ -notmatch '\.md$' -and $_ -notmatch 'Cargo\.(toml|lock)$' }
          $changed | Out-File -FilePath target/evidence/changed_files.txt -Encoding utf8
          if ($changed.Count -eq 0) {
            Write-Host "::notice::no production Rust files changed; per-file gate is a no-op"
            exit 0
          }
          python3 scripts/ci/per_file_coverage_gate.py --lcov target/evidence/lcov.info --changed-files target/evidence/changed_files.txt
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::per-file 100% gate failed; the changed v1-critical files must be at 100% line+branch coverage"
            exit $LASTEXITCODE
          }
      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-gate-evidence
          path: target/evidence/lcov.info
          if-no-files-found: warn
          retention-days: 30

  # WP-25.01 (#759): module-size gate.  The 4 oversized
  # production files (main.rs, tui/mod.rs, config/mod.rs,
  # pipeline/mod.rs) are tracked by issue #759 for a
  # refactor pass; the gate is the regression catcher.
  #
  # The script excludes `src/bin/` because the bin/ directory
  # is intentionally long-running procedural code (benchmarks,
  # probes) that is not subject to the 1000-LOC gate.
  module-size-gate:
    name: Module-size gate (1000 LOC per file)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce module-size gate
        shell: pwsh
        run: |
          python3 scripts/ci/check_module_sizes.py --threshold 1000
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::module-size gate failed; the listed files must be split before the next release"
            exit $LASTEXITCODE
          }

  # WP-25.05 (#763): panic-site cap for `src/main.rs`.
  # The audit's top cực-gắt finding was 141 panic-prone
  # sites in the binary entry point.  The acceptance
  # criterion for the work is < 50 sites, so we cap the
  # counter at 50 here.  The CI runner uses the same script
  # (`scripts/ci/panic_sites.py`) as the unit tests, so any
  # future change to the counting policy must come with a
  # test update — preventing a malicious "fix" that simply
  # under-counts the patterns.
  panic-sites-gate:
    name: Panic-sites gate (src/main.rs < 50)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enforce panic-site cap
        shell: pwsh
        run: |
          python3 scripts/ci/panic_sites.py --path src/main.rs --max 50
          if ($LASTEXITCODE -ne 0) {
            Write-Host "::error::panic-site cap exceeded for src/main.rs (see issue #763); reduce the count below 50 before merge"
            exit $LASTEXITCODE
          }
