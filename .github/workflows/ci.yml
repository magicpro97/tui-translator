name: CI\n\non:\n  push:\n  pull_request:\n\nenv:\n  CARGO_TERM_COLOR: always\n  RUST_BACKTRACE: 1\n\njobs:\n  # ── Format ──────────────────────────────────────────────────────────────────\n  fmt:\n    name: Format check (rustfmt)\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n        with:\n          components: rustfmt\n      - name: Check formatting\n        run: cargo fmt --all -- --check\n\n  # ── Lint ────────────────────────────────────────────────────────────────────\n  clippy:\n    name: Lint (clippy)\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n        with:\n          components: clippy\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}\n      - name: Configure libclang for whisper-rs bindgen\n        shell: pwsh\n        run: |\n          $candidates = @(\n            "$env:ProgramFiles\LLVM\bin",\n            "${env:ProgramFiles(x86)}\LLVM\bin"\n          )\n          $clangBin = $candidates |\n            Where-Object { Test-Path (Join-Path $_ "libclang.dll") } |\n            Select-Object -First 1\n\n          if (-not $clangBin) {\n            choco install llvm -y --no-progress\n            $clangBin = "$env:ProgramFiles\LLVM\bin"\n          }\n\n          if (-not (Test-Path (Join-Path $clangBin "libclang.dll"))) {\n            throw "libclang.dll not found after LLVM setup"\n          }\n\n          "LIBCLANG_PATH=$clangBin" >> $env:GITHUB_ENV\n          "$clangBin" >> $env:GITHUB_PATH\n      - name: Run clippy\n        run: cargo clippy --all-targets --all-features -- -D warnings\n\n  # ── Build & Test ─────────────────────────────────────────────────────────────\n  test:\n    name: Build and test\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}\n      - name: Build (debug)\n        run: cargo build --bins\n      - name: Build (release)\n        run: cargo build --release --bins\n      - name: Run binary unit tests (skip future real_api cases)\n        run: cargo test --bins -- --nocapture --skip real_api\n\n  # ── PTY tests (Issue #108) ───────────────────────────────────────────────────\n  # Runs the dedicated `pty` integration-test binary on a real Windows\n  # GitHub-hosted runner so the ConPTY-based terminal behaviour tests are a\n  # distinct CI job on every push and pull request.\n  #\n  # `cargo test --test pty` compiles the `tui-translator` binary as a side\n  # effect (via `env!("CARGO_BIN_EXE_tui-translator")`) before running the\n  # tests, so no separate build step is needed.\n  #\n  # The tests do NOT require a real audio device: the TUI renders its full\n  # layout even when WASAPI audio capture returns an error, and each test\n  # injects `RUST_LOG=off` to keep the PTY byte stream clean.\n  pty-test:\n    name: PTY tests (Windows ConPTY)\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-pty-${{ hashFiles('**/Cargo.lock') }}\n      - name: Run PTY tests (issue #108)\n        run: cargo test --test pty -- --nocapture\n\n  # ── VMIC-A6 virtual-cable CI evidence ────────────────────────────────────────\n  # Hosted Windows runners do not reliably expose installable audio cable\n  # drivers. This job still proves the deterministic PCM write/capture harness\n  # on every run and upgrades to a real VB-CABLE/VAC/Voicemeeter loopback test\n  # automatically when such a render endpoint is detected.\n  vmic-audio-integration:\n    name: VMIC-A6 virtual-cable integration\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-vmic-a6-${{ hashFiles('**/Cargo.lock') }}\n      - name: Run feature-gated VMIC-A6 tests\n        run: cargo test --features audio-integration --test vmic_audio_integration -- --nocapture\n      - name: Write VMIC-A6 evidence artifact\n        run: >\n          cargo run --features audio-integration --bin vbcable_ci_probe --\n          --duration-ms 750\n          --out verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json\n      - name: Validate VMIC-A6 evidence schema\n        shell: pwsh\n        run: |\n          $path = "verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json"\n          if (-not (Test-Path $path)) { throw "VMIC-A6 report not found at $path" }\n          $report = Get-Content $path -Raw | ConvertFrom-Json\n          if ($report.schema_version -ne 1) { throw "unexpected schema_version: $($report.schema_version)" }\n          if ($report.issue -ne "#318") { throw "unexpected issue: $($report.issue)" }\n          if ($report.status -ne "pass") { throw "VMIC-A6 report did not pass: $($report | ConvertTo-Json -Depth 8)" }\n          if (-not $report.generated_audio -or $report.generated_audio.rms -le 0.30) {\n            throw "generated_audio.rms is missing or too low"\n          }\n          $memory = $report.tiers | Where-Object { $_.name -eq "memory_pcm" } | Select-Object -First 1\n          if (-not $memory -or $memory.status -ne "pass") { throw "memory_pcm tier did not pass" }\n          $real = $report.tiers | Where-Object { $_.name -eq "real_virtual_cable" } | Select-Object -First 1\n          if (-not $real) { throw "real_virtual_cable tier missing" }\n          if ($real.status -eq "skipped" -and -not $real.skip_reason) {\n            throw "real_virtual_cable skipped without an explicit reason"\n          }\n          Write-Host ($report | ConvertTo-Json -Depth 8)\n      - name: Upload VMIC-A6 evidence\n        if: always()\n        uses: actions/upload-artifact@v4\n        with:\n          name: vmic-a6-vbcable-ci-report\n          path: verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json\n\n  # ── Contract tests (mock-only) ───────────────────────────────────────────────\n  # Runs the dedicated `contract` integration-test binary.\n  # No real API keys or network access are required.\n  # Tests whose names contain `real_api` are excluded via the --skip filter so\n  # that live-credential tests can be added later without breaking this gate.\n  contract-test:\n    name: Contract tests (mock-only)\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}\n      - name: Run contract tests (mock-only, no API keys)\n        run: cargo test --test contract -- --skip real_api\n\n  # ── Integration tests (Issues #99, #100, #102) ──────────────────────────────\n  # Runs the dedicated `integration` test binary with pre-committed WAV fixtures,\n  # mock providers, and real pipeline-boundary tests. No API keys or network\n  # access are required.\n  #\n  # Note: `tests/integration.rs` path-imports `providers`, `audio`, `metrics`,\n  # `tui`, and `pipeline`, so this binary also includes those modules' inline\n  # `#[cfg(test)]` unit tests. The `--skip providers::google` filter excludes the\n  # Google provider unit tests only; the remaining imported-module tests are part\n  # of the intended integration-binary scope because issue #102 now drives the\n  # real orchestrator boundary.\n  integration-test:\n    name: Integration tests (fixtures + pipeline boundary)\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}\n      - name: Run integration binary (mock providers, no API keys)\n        run: cargo test --test integration -- --nocapture --skip providers::google\n\n  # ── Packaging verification (Issue #90 / WP-14.01) ────────────────────────────\n  # Confirm that the release binary for x86_64-pc-windows-msvc has no external\n  # VC++ runtime DLL dependencies (vcruntime140.dll, msvcp140.dll).\n  # .cargo/config.toml sets "+crt-static" for this target, which links the\n  # MSVC CRT statically so no VC Redistributable is needed on end-user machines.\n  packaging:\n    name: Packaging verification (MSVC static exe)\n    runs-on: windows-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n        with:\n          targets: x86_64-pc-windows-msvc\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-pkg-${{ hashFiles('**/Cargo.lock') }}\n      - name: Build release exe (MSVC target)\n        run: cargo build --release --target x86_64-pc-windows-msvc --bins\n      - name: Confirm single exe artifact exists\n        run: |\n          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"\n          if (-not (Test-Path $exe)) { throw "Release exe not found at $exe" }\n          $size = (Get-Item $exe).Length\n          Write-Host "artifact: $exe  ($([math]::Round($size/1MB,2)) MB)"\n      - name: Inspect DLL imports and assert no VC++ runtime DLLs\n        shell: pwsh\n        run: |\n          # Locate dumpbin via vswhere (always available on windows-latest)\n          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"\n          $vsPath  = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath\n          $dumpbin = Join-Path $vsPath "VC\Tools\MSVC" |\n                     Get-ChildItem -Directory | Sort-Object Name -Descending | Select-Object -First 1 |\n                     ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\dumpbin.exe" }\n          if (-not (Test-Path $dumpbin)) { throw "dumpbin.exe not found under $vsPath" }\n          Write-Host "Using dumpbin: $dumpbin"\n          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"\n          $raw = & $dumpbin /DEPENDENTS $exe 2>&1\n          if ($LASTEXITCODE -ne 0) {\n            throw "dumpbin exited $LASTEXITCODE. Output: $($raw -join ' ')"\n          }\n          Write-Host ($raw -join "`n")\n          $banned = $raw | Select-String -Pattern "vcruntime140|msvcp140" -CaseSensitive:$false\n          if ($banned) {\n            Write-Error "FAIL: banned VC++ runtime DLLs found:`n$banned"\n            exit 1\n          }\n          Write-Host "PASS: no vcruntime140.dll or msvcp140.dll in dependency list."\n\n  # ── Soak fixture validation (Issue #109 / WP-18.01) ─────────────────────────\n  # Validates tests/soak/soak_audio.wav: WAV format, leading silence, speech RMS,\n  # loud transient peak, and trailing silence.  The fixture is committed directly\n  # to the repository (≈ 938 KiB — well within normal git limits) so no LFS or\n  # network access is needed.  The test does NOT run a 4-hour soak loop; it only\n  # validates the small pre-generated fixture file.\n  soak-test:\n    name: Soak fixture validation (issue #109)\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}\n      - name: Validate soak fixture\n        run: cargo test --test soak -- --nocapture\n\n  # ── Soak runner dry-run (Issue #110 / WP-18.02) ──────────────────────────────\n  # Validates the run_soak binary in --dry-run mode:\n  #   1. Builds the run_soak binary (confirms it compiles without warnings).\n  #   2. Runs the binary's internal unit tests (report serialisation, JSON\n  #      helpers, fixture existence check).\n  #   3. Runs the soak_runner integration test which invokes `run_soak --dry-run`\n  #      and validates the produced JSON report structure.\n  #\n  # The full 4-hour soak run is NOT executed here.  It is run manually before\n  # each release candidate and its report is committed as verification evidence.\n  soak-runner:\n    name: Soak runner dry-run (issue #110)\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-soak-runner-${{ hashFiles('**/Cargo.lock') }}\n      - name: Build run_soak binary\n        run: cargo build --bin run_soak\n      - name: Run run_soak unit tests\n        run: cargo test --bin run_soak -- --nocapture\n      - name: Run soak_runner integration test (dry-run)\n        run: cargo test --test soak_runner -- --nocapture\n      - name: Confirm report was produced and is valid JSON\n        run: |\n          report="verification-evidence/soak-report-ci.json"\n          if [ ! -f "$report" ]; then\n            echo "FAIL: $report was not created by the dry-run"\n            exit 1\n          fi\n          python3 -m json.tool "$report" > /dev/null && echo "PASS: $report is valid JSON"\n          cat "$report"\n\n  # ── Linux smoke ─────────────────────────────────────────────────────────────\n  # We also build on Linux so that CI does not fail if a contributor uses\n  # a non-Windows machine.  Audio capture tests are excluded; they need\n  # real Windows hardware.\n  linux-smoke:\n    name: Linux build smoke test\n    runs-on: ubuntu-latest\n    steps:\n      - uses: actions/checkout@v4\n      - uses: dtolnay/rust-toolchain@stable\n      - name: Cache cargo registry\n        uses: actions/cache@v4\n        with:\n          path: |\n            ~/.cargo/registry\n            ~/.cargo/git\n            target\n          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}\n      - name: Build (debug)\n        run: cargo build --bins\n      - name: Run binary unit tests (no audio, skip future real_api cases)\n        run: cargo test --bins -- --nocapture --skip real_api\n