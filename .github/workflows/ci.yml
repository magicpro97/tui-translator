name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Format check (rustfmt)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Build & Test ─────────────────────────────────────────────────────────────
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug)
        run: cargo build --bins
      - name: Build (release)
        run: cargo build --release --bins
      - name: Run binary unit tests (skip future real_api cases)
        run: cargo test --bins -- --nocapture --skip real_api

  # ── PTY tests (Issue #108) ───────────────────────────────────────────────────
  # Runs the dedicated `pty` integration-test binary on a real Windows
  # GitHub-hosted runner so the ConPTY-based terminal behaviour tests are a
  # distinct CI job on every push and pull request.
  #
  # `cargo test --test pty` compiles the `tui-translator` binary as a side
  # effect (via `env!("CARGO_BIN_EXE_tui-translator")`) before running the
  # tests, so no separate build step is needed.
  #
  # The tests do NOT require a real audio device: the TUI renders its full
  # layout even when WASAPI audio capture returns an error, and each test
  # injects `RUST_LOG=off` to keep the PTY byte stream clean.
  pty-test:
    name: PTY tests (Windows ConPTY)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pty-${{ hashFiles('**/Cargo.lock') }}
      - name: Run PTY tests (issue #108)
        run: cargo test --test pty -- --nocapture

  # ── Contract tests (mock-only) ───────────────────────────────────────────────
  # Runs the dedicated `contract` integration-test binary.
  # No real API keys or network access are required.
  # Tests whose names contain `real_api` are excluded via the --skip filter so
  # that live-credential tests can be added later without breaking this gate.
  contract-test:
    name: Contract tests (mock-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run contract tests (mock-only, no API keys)
        run: cargo test --test contract -- --skip real_api

  # ── Integration tests (Issues #99, #100, #102) ──────────────────────────────
  # Runs the dedicated `integration` test binary with pre-committed WAV fixtures,
  # mock providers, and real pipeline-boundary tests. No API keys or network
  # access are required.
  #
  # Note: `tests/integration.rs` path-imports `providers`, `audio`, `metrics`,
  # `tui`, and `pipeline`, so this binary also includes those modules' inline
  # `#[cfg(test)]` unit tests. The `--skip providers::google` filter excludes the
  # Google provider unit tests only; the remaining imported-module tests are part
  # of the intended integration-binary scope because issue #102 now drives the
  # real orchestrator boundary.
  integration-test:
    name: Integration tests (fixtures + pipeline boundary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run integration binary (mock providers, no API keys)
        run: cargo test --test integration -- --nocapture --skip providers::google

  # ── Packaging verification (Issue #90 / WP-14.01) ────────────────────────────
  # Confirm that the release binary for x86_64-pc-windows-msvc has no external
  # VC++ runtime DLL dependencies (vcruntime140.dll, msvcp140.dll).
  # .cargo/config.toml sets "+crt-static" for this target, which links the
  # MSVC CRT statically so no VC Redistributable is needed on end-user machines.
  packaging:
    name: Packaging verification (MSVC static exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pkg-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release exe (MSVC target)
        run: cargo build --release --target x86_64-pc-windows-msvc --bins
      - name: Confirm single exe artifact exists
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          if (-not (Test-Path $exe)) { throw "Release exe not found at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "artifact: $exe  ($([math]::Round($size/1MB,2)) MB)"
      - name: Inspect DLL imports and assert no VC++ runtime DLLs
        shell: pwsh
        run: |
          # Locate dumpbin via vswhere (always available on windows-latest)
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Join-Path $vsPath "VC\Tools\MSVC" |
                     Get-ChildItem -Directory | Sort-Object Name -Descending | Select-Object -First 1 |
                     ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\dumpbin.exe" }
          if (-not (Test-Path $dumpbin)) { throw "dumpbin.exe not found under $vsPath" }
          Write-Host "Using dumpbin: $dumpbin"
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          $raw = & $dumpbin /DEPENDENTS $exe 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin exited $LASTEXITCODE. Output: $($raw -join ' ')"
          }
          Write-Host ($raw -join "`n")
          $banned = $raw | Select-String -Pattern "vcruntime140|msvcp140" -CaseSensitive:$false
          if ($banned) {
            Write-Error "FAIL: banned VC++ runtime DLLs found:`n$banned"
            exit 1
          }
          Write-Host "PASS: no vcruntime140.dll or msvcp140.dll in dependency list."

  # ── Soak fixture validation (Issue #109 / WP-18.01) ─────────────────────────
  # Validates tests/soak/soak_audio.wav: WAV format, leading silence, speech RMS,
  # loud transient peak, and trailing silence.  The fixture is committed directly
  # to the repository (≈ 938 KiB — well within normal git limits) so no LFS or
  # network access is needed.  The test does NOT run a 4-hour soak loop; it only
  # validates the small pre-generated fixture file.
  soak-test:
    name: Soak fixture validation (issue #109)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
      - name: Validate soak fixture
        run: cargo test --test soak -- --nocapture

  # ── Linux smoke ─────────────────────────────────────────────────────────────
  # We also build on Linux so that CI does not fail if a contributor uses
  # a non-Windows machine.  Audio capture tests are excluded; they need
  # real Windows hardware.
  linux-smoke:
    name: Linux build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug)
        run: cargo build --bins
      - name: Run binary unit tests (no audio, skip future real_api cases)
        run: cargo test --bins -- --nocapture --skip real_api
