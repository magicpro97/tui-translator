name: CI

on:
  push:
  pull_request:
  # Issue #461 / CI-01: allow manual dispatch so the new cross-platform +
  # feature matrix can be exercised on a feature branch before branch
  # protection is updated. Evidence URL: verification-evidence/ci/CI-01-matrix-run-url.json.
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Format check (rustfmt)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: windows-latest
    env:
      CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
      CMAKE_POLICY_DEFAULT_CMP0091: NEW
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Configure libclang for whisper-rs bindgen
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\LLVM\bin",
            "${env:ProgramFiles(x86)}\LLVM\bin"
          )
          $clangBin = $candidates |
            Where-Object { Test-Path (Join-Path $_ "libclang.dll") } |
            Select-Object -First 1

          if (-not $clangBin) {
            choco install llvm -y --no-progress
            $clangBin = "$env:ProgramFiles\LLVM\bin"
          }

          if (-not (Test-Path (Join-Path $clangBin "libclang.dll"))) {
            throw "libclang.dll not found after LLVM setup"
          }

          "LIBCLANG_PATH=$clangBin" >> $env:GITHUB_ENV
          "$clangBin" >> $env:GITHUB_PATH
      - name: Clean cached whisper native build
        run: cargo clean -p whisper-rs-sys -p whisper-rs
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Run all-features test suite
        run: cargo test --all-features -- --nocapture --skip real_api

  # ── Build & Test ─────────────────────────────────────────────────────────────
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug)
        run: cargo build --bins
      - name: Build (release)
        run: cargo build --release --bins
      - name: Run binary unit tests (skip future real_api cases)
        run: cargo test --bins -- --nocapture --skip real_api

  # ── PTY tests (Issue #108) ───────────────────────────────────────────────────
  # Runs the dedicated `pty` integration-test binary on a real Windows
  # GitHub-hosted runner so the ConPTY-based terminal behaviour tests are a
  # distinct CI job on every push and pull request.
  #
  # `cargo test --test pty` compiles the `tui-translator` binary as a side
  # effect (via `env!("CARGO_BIN_EXE_tui-translator")`) before running the
  # tests, so no separate build step is needed.
  #
  # The tests do NOT require a real audio device: the TUI renders its full
  # layout even when WASAPI audio capture returns an error, and each test
  # injects `RUST_LOG=off` to keep the PTY byte stream clean.
  pty-test:
    name: PTY tests (Windows ConPTY)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pty-${{ hashFiles('**/Cargo.lock') }}
      - name: Run PTY tests (issue #108)
        run: cargo test --test pty -- --nocapture

  # VMIC-A6 virtual-cable CI evidence
  # Hosted Windows runners do not reliably expose installable audio cable
  # drivers. This job still proves the deterministic PCM write/capture harness
  # on every run and upgrades to a real VB-CABLE/VAC/Voicemeeter loopback test
  # automatically when such a render endpoint is detected.
  vmic-audio-integration:
    name: VMIC-A6 virtual-cable integration
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vmic-a6-${{ hashFiles('**/Cargo.lock') }}
      - name: Run feature-gated VMIC-A6 tests
        run: cargo test --features audio-integration --test vmic_audio_integration -- --nocapture
      - name: Write VMIC-A6 evidence artifact
        run: >
          cargo run --features audio-integration --bin vbcable_ci_probe --
          --duration-ms 750
          --out verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json
      - name: Validate VMIC-A6 evidence schema
        shell: pwsh
        run: |
          $path = "verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json"
          if (-not (Test-Path $path)) { throw "VMIC-A6 report not found at $path" }
          $report = Get-Content $path -Raw | ConvertFrom-Json
          if ($report.schema_version -ne 1) { throw "unexpected schema_version: $($report.schema_version)" }
          if ($report.issue -ne "#318") { throw "unexpected issue: $($report.issue)" }
          if ($report.status -ne "pass") { throw "VMIC-A6 report did not pass: $($report | ConvertTo-Json -Depth 8)" }
          if (-not $report.generated_audio -or $report.generated_audio.rms -le 0.30) {
            throw "generated_audio.rms is missing or too low"
          }
          $memory = $report.tiers | Where-Object { $_.name -eq "memory_pcm" } | Select-Object -First 1
          if (-not $memory -or $memory.status -ne "pass") { throw "memory_pcm tier did not pass" }
          $real = $report.tiers | Where-Object { $_.name -eq "real_virtual_cable" } | Select-Object -First 1
          if (-not $real) { throw "real_virtual_cable tier missing" }
          if ($real.status -eq "skipped" -and -not $real.skip_reason) {
            throw "real_virtual_cable skipped without an explicit reason"
          }
          Write-Host ($report | ConvertTo-Json -Depth 8)
      - name: Upload VMIC-A6 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmic-a6-vbcable-ci-report
          path: verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json

  # VMIC-B4 production sink round-trip
  # Proves the selected OEM/commercial virtual-cable sink contract without
  # requiring Zoom, Teams, a live meeting, manual listening, or an installed
  # vendor cable on the hosted runner.
  vmic-production-sink:
    name: VMIC-B4 production sink round-trip
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vmic-b4-${{ hashFiles('**/Cargo.lock') }}
      - name: Run VMIC-B4 production sink round-trip
        run: cargo test --features production-audio production_sink_roundtrip -- --nocapture
      - name: Validate VMIC-B4 committed evidence
        shell: pwsh
        run: |
          $path = "verification-evidence\vmic\VMIC-B4-production-sink-roundtrip.json"
          if (-not (Test-Path $path)) { throw "VMIC-B4 report not found at $path" }
          $report = Get-Content $path -Raw | ConvertFrom-Json
          if ($report.schema_version -ne 1) { throw "unexpected schema_version: $($report.schema_version)" }
          if ($report.issue -ne "#324") { throw "unexpected issue: $($report.issue)" }
          if ($report.status -ne "pass") { throw "VMIC-B4 report did not pass" }
          if ($report.sink -ne "OemCableSink") { throw "unexpected sink: $($report.sink)" }
          if ($report.dropped_frames -ne 0) { throw "dropped_frames must be zero" }
          if ($report.latency.p95_ms -gt $report.p95_gate_ms) {
            throw "p95 latency $($report.latency.p95_ms) exceeds gate $($report.p95_gate_ms)"
          }
          Write-Host ($report | ConvertTo-Json -Depth 8)
      - name: Upload VMIC-B4 evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmic-b4-production-sink-roundtrip
          path: verification-evidence\vmic\VMIC-B4-production-sink-roundtrip.json

  # VMIC-A8 MVP readiness checkpoint
  # Aggregates all VMIC MVP evidence and proves the release smoke path without
  # Zoom, Teams, live meetings, manual audio checks, or human acceptance.
  vmic-mvp-readiness:
    name: VMIC-A8 MVP readiness
    runs-on: windows-latest
    needs: [vmic-audio-integration]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vmic-a8-${{ hashFiles('**/Cargo.lock') }}
      - name: Download current VMIC-A6 evidence
        uses: actions/download-artifact@v4
        with:
          name: vmic-a6-vbcable-ci-report
          path: vmic-a6-current-evidence
      - name: Install current VMIC-A6 evidence
        shell: pwsh
        run: |
          $files = @(Get-ChildItem -Path vmic-a6-current-evidence -Recurse -File -Filter VMIC-A6-vbcable-ci-report.json)
          if ($files.Count -ne 1) {
            throw "expected exactly one current VMIC-A6 evidence file, found $($files.Count)"
          }
          $destination = "verification-evidence\vmic\VMIC-A6-vbcable-ci-report.json"
          Copy-Item -Path $files[0].FullName -Destination $destination -Force
      - name: Check VMIC MVP evidence
        shell: pwsh
        run: pwsh -NoProfile -File scripts\check-vmic-mvp-evidence.ps1 -Json
      - name: Run VMIC-A8 readiness test
        run: cargo test --test vmic_mvp_readiness -- --nocapture
      - name: Build release executable
        run: cargo build --release --bin tui-translator
      - name: Hash release executable
        shell: pwsh
        run: |
          $exe = ".\target\release\tui-translator.exe"
          if (-not (Test-Path $exe)) { throw "release executable not found at $exe" }
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          $bytes = (Get-Item $exe).Length
          "sha256=$hash" | Tee-Object -FilePath verification-evidence\vmic\VMIC-A8-release-sha256.txt
          "bytes=$bytes" | Add-Content -Path verification-evidence\vmic\VMIC-A8-release-sha256.txt
      - name: Smoke release device listing
        shell: pwsh
        run: |
          .\target\release\tui-translator.exe --list-audio-devices
          .\target\release\tui-translator.exe --list-capture-devices
      - name: Upload VMIC-A8 readiness report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmic-a8-mvp-readiness-report
          path: |
            verification-evidence\vmic\VMIC-A8-mvp-readiness-report.md
            verification-evidence\vmic\VMIC-A8-release-sha256.txt

  # ── Contract tests (mock-only) ───────────────────────────────────────────────
  # Runs the dedicated `contract` integration-test binary.
  # No real API keys or network access are required.
  # Tests whose names contain `real_api` are excluded via the --skip filter so
  # that live-credential tests can be added later without breaking this gate.
  contract-test:
    name: Contract tests (mock-only)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run contract tests (mock-only, no API keys)
        run: cargo test --test contract -- --skip real_api

  # ── Integration tests (Issues #99, #100, #102) ──────────────────────────────
  # Runs the dedicated `integration` test binary with pre-committed WAV fixtures,
  # mock providers, and real pipeline-boundary tests. No API keys or network
  # access are required.
  #
  # Note: `tests/integration.rs` path-imports `providers`, `audio`, `metrics`,
  # `tui`, and `pipeline`, so this binary also includes those modules' inline
  # `#[cfg(test)]` unit tests. The `--skip providers::google` filter excludes the
  # Google provider unit tests only; the remaining imported-module tests are part
  # of the intended integration-binary scope because issue #102 now drives the
  # real orchestrator boundary.
  integration-test:
    name: Integration tests (fixtures + pipeline boundary)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run integration binary (mock providers, no API keys)
        run: cargo test --test integration -- --nocapture --skip providers::google

  # ── Packaging verification (Issue #90 / WP-14.01) ────────────────────────────
  # Confirm that the release binary for x86_64-pc-windows-msvc has no external
  # VC++ runtime DLL dependencies (vcruntime140.dll, msvcp140.dll).
  # .cargo/config.toml sets "+crt-static" for this target, which links the
  # MSVC CRT statically so no VC Redistributable is needed on end-user machines.
  packaging:
    name: Packaging verification (MSVC static exe)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-pkg-${{ hashFiles('**/Cargo.lock') }}
      - name: Build release exe (MSVC target)
        run: cargo build --release --target x86_64-pc-windows-msvc --bins
      - name: Confirm single exe artifact exists
        run: |
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          if (-not (Test-Path $exe)) { throw "Release exe not found at $exe" }
          $size = (Get-Item $exe).Length
          Write-Host "artifact: $exe  ($([math]::Round($size/1MB,2)) MB)"
      - name: Inspect DLL imports and assert no VC++ runtime DLLs
        shell: pwsh
        run: |
          # Locate dumpbin via vswhere (always available on windows-latest)
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath  = & $vswhere -latest -products * -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $dumpbin = Join-Path $vsPath "VC\Tools\MSVC" |
                     Get-ChildItem -Directory | Sort-Object Name -Descending | Select-Object -First 1 |
                     ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\dumpbin.exe" }
          if (-not (Test-Path $dumpbin)) { throw "dumpbin.exe not found under $vsPath" }
          Write-Host "Using dumpbin: $dumpbin"
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          $raw = & $dumpbin /DEPENDENTS $exe 2>&1
          if ($LASTEXITCODE -ne 0) {
            throw "dumpbin exited $LASTEXITCODE. Output: $($raw -join ' ')"
          }
          Write-Host ($raw -join "`n")
          $banned = $raw | Select-String -Pattern "vcruntime140|msvcp140" -CaseSensitive:$false
          if ($banned) {
            Write-Error "FAIL: banned VC++ runtime DLLs found:`n$banned"
            exit 1
          }
          Write-Host "PASS: no vcruntime140.dll or msvcp140.dll in dependency list."

  # ── Soak fixture validation (Issue #109 / WP-18.01) ─────────────────────────
  # Validates tests/soak/soak_audio.wav: WAV format, leading silence, speech RMS,
  # loud transient peak, and trailing silence.  The fixture is committed directly
  # to the repository (≈ 938 KiB — well within normal git limits) so no LFS or
  # network access is needed.  The test does NOT run a 4-hour soak loop; it only
  # validates the small pre-generated fixture file.
  soak-test:
    name: Soak fixture validation (issue #109)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-${{ hashFiles('**/Cargo.lock') }}
      - name: Validate soak fixture
        run: cargo test --test soak -- --nocapture

  # ── Soak runner dry-run (Issue #110 / WP-18.02) ──────────────────────────────
  # Validates the run_soak binary in --dry-run mode:
  #   1. Builds the run_soak binary (confirms it compiles without warnings).
  #   2. Runs the binary's internal unit tests (report serialisation, JSON
  #      helpers, fixture existence check).
  #   3. Runs the soak_runner integration test which invokes `run_soak --dry-run`
  #      and validates the produced JSON report structure.
  #
  # The full 4-hour soak run is NOT executed here.  It is run manually before
  # each release candidate and its report is committed as verification evidence.
  soak-runner:
    name: Soak runner dry-run (issue #110)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-soak-runner-${{ hashFiles('**/Cargo.lock') }}
      - name: Build run_soak binary
        run: cargo build --bin run_soak
      - name: Run run_soak unit tests
        run: cargo test --bin run_soak -- --nocapture
      - name: Run soak_runner integration test (dry-run)
        run: cargo test --test soak_runner -- --nocapture
      - name: Confirm report was produced and is valid JSON
        run: |
          report="verification-evidence/soak-report-ci.json"
          if [ ! -f "$report" ]; then
            echo "FAIL: $report was not created by the dry-run"
            exit 1
          fi
          python3 -m json.tool "$report" > /dev/null && echo "PASS: $report is valid JSON"
          cat "$report"

  # ── Hot-config matrix (Issue #391 / HC-06) ──────────────────────────────────
  # Parametrized integration tests covering every classified hot-config field.
  # Emits a JSON matrix report consumed by the verification gate.
  hot-config-matrix:
    name: Hot-config matrix (issue #391)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-hot-config-${{ hashFiles('**/Cargo.lock') }}
      - name: Run hot-config matrix
        run: cargo test --test hot_config -- --nocapture
      - name: Validate HC-06 matrix evidence
        shell: pwsh
        run: |
          $path = "verification-evidence\hot-config\HC-06-hot-config-matrix-report.json"
          if (-not (Test-Path $path)) { throw "HC-06 matrix report not found at $path" }
          $r = Get-Content $path -Raw | ConvertFrom-Json
          if ($r.schema_version -ne 1) { throw "unexpected schema_version: $($r.schema_version)" }
          if ($r.issue -ne "#391") { throw "unexpected issue: $($r.issue)" }
          if ($r.status -ne "pass") { throw "matrix did not pass" }
          if (-not $r.cases -or $r.cases.Count -lt 1) { throw "matrix cases missing" }
          Write-Host ($r | ConvertTo-Json -Depth 8)
      - name: Upload HC-06 matrix evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: hc-06-hot-config-matrix-report
          path: verification-evidence\hot-config\HC-06-hot-config-matrix-report.json

  # VMIC-B5 production readiness checkpoint
  # Aggregates VMIC-B evidence, builds the release executable, labels the app
  # artifact as unsigned/no-driver-bundled, and captures release smoke output.
  vmic-production-readiness:
    name: VMIC-B5 production readiness
    runs-on: windows-latest
    needs: [vmic-production-sink, vmic-mvp-readiness, packaging, soak-test, soak-runner, hot-config-matrix]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-vmic-b5-${{ hashFiles('**/Cargo.lock') }}
      - name: Check VMIC production evidence
        shell: pwsh
        run: pwsh -NoProfile -File scripts\check-vmic-production-evidence.ps1 -Json
      - name: Run VMIC-B5 readiness test
        run: cargo test --test vmic_b5_production_readiness -- --nocapture
      - name: Build release executable
        run: cargo build --release --bin tui-translator
      - name: Hash release executable
        shell: pwsh
        run: |
          $exe = ".\target\release\tui-translator.exe"
          if (-not (Test-Path $exe)) { throw "release executable not found at $exe" }
          $hash = (Get-FileHash -Algorithm SHA256 $exe).Hash.ToLowerInvariant()
          $bytes = (Get-Item $exe).Length
          $out = "verification-evidence\vmic\VMIC-B5-release-sha256.txt"
          "sha256=$hash" | Tee-Object -FilePath $out
          "bytes=$bytes" | Add-Content -Path $out
          "unsigned=true" | Add-Content -Path $out
          "driver_bundled=false" | Add-Content -Path $out
      - name: Smoke release device listing
        shell: pwsh
        run: |
          $log = "verification-evidence\vmic\VMIC-B5-smoke-log.txt"
          "--list-audio-devices" | Tee-Object -FilePath $log
          .\target\release\tui-translator.exe --list-audio-devices *>&1 | Tee-Object -FilePath $log -Append
          $audioExit = $LASTEXITCODE
          if ($audioExit -ne 0) {
            "audio_devices_exit=$audioExit" | Tee-Object -FilePath $log -Append
            throw "--list-audio-devices exited $audioExit"
          }
          "audio_devices_exit=0" | Tee-Object -FilePath $log -Append
          "--list-capture-devices" | Tee-Object -FilePath $log -Append
          .\target\release\tui-translator.exe --list-capture-devices *>&1 | Tee-Object -FilePath $log -Append
          $captureExit = $LASTEXITCODE
          if ($captureExit -ne 0) {
            "capture_devices_exit=$captureExit" | Tee-Object -FilePath $log -Append
            throw "--list-capture-devices exited $captureExit"
          }
          "capture_devices_exit=0" | Tee-Object -FilePath $log -Append
          "smoke_status=pass" | Tee-Object -FilePath $log -Append
      - name: Validate release hash and smoke artifacts
        shell: pwsh
        run: >
          pwsh -NoProfile -File scripts\check-vmic-production-evidence.ps1 -Json
          -ReleaseHashPath verification-evidence\vmic\VMIC-B5-release-sha256.txt
          -SmokeLogPath verification-evidence\vmic\VMIC-B5-smoke-log.txt
      - name: Upload VMIC-B5 readiness artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vmic-b5-production-readiness
          path: |
            verification-evidence\vmic\VMIC-B5-production-readiness-report.md
            verification-evidence\vmic\VMIC-B5-release-sha256.txt
            verification-evidence\vmic\VMIC-B5-smoke-log.txt

  # ── Linux smoke ─────────────────────────────────────────────────────────────
  # We also build on Linux so that CI does not fail if a contributor uses
  # a non-Windows machine.  Audio capture tests are excluded; they need
  # real Windows hardware.
  linux-smoke:
    name: Linux build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug, --locked)
        # CI-02 (#475): `--locked` so any tampering of `Cargo.lock` fails
        # the Linux smoke gate the same way it fails the Windows/macOS
        # CI-01 matrix gates. Preserves the pre-existing
        # `Linux build smoke test` required-check context name.
        run: cargo build --locked --bins
      - name: Run binary unit tests (no audio, skip future real_api cases)
        run: cargo test --locked --bins -- --nocapture --skip real_api

  # ── CI-02 Linux format check (Issue #475) ──────────────────────────────────
  # Linux-native rustfmt parity gate. The Windows `Format check (rustfmt)`
  # gate is preserved unchanged; this is an additional Linux-side gate so a
  # contributor on Linux gets the same fast feedback as on Windows.
  linux-fmt:
    name: Linux format check (rustfmt)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── CI-02 Linux clippy (Issue #475) ────────────────────────────────────────
  # Linux-native clippy parity gate. Runs `--all-targets` on default features
  # only — feature-gated local-stt/local-mt clippy is deferred to LINUX-02
  # (#469) which lands the native toolchains.
  linux-clippy:
    name: Linux lint (clippy)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci02-clippy-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy (default features, all targets)
        run: cargo clippy --locked --all-targets -- -D warnings

  # ── CI-02 Linux rustdoc (Issue #475) ───────────────────────────────────────
  # Catches broken intra-doc links and rustdoc warnings early on Linux.
  linux-doc:
    name: Linux rustdoc check
    runs-on: ubuntu-22.04
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci02-doc-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo doc (no deps, --locked)
        run: cargo doc --locked --no-deps --bins

  # ── CI-02 Linux local-stt compile (Issue #475) — ADVISORY ──────────────────
  # Compiles the `local-stt` feature on Linux to detect bindgen/clang
  # regressions early. Marked allowed-fail because the native whisper.cpp
  # toolchain on GitHub-hosted Linux runners is not yet stabilised for this
  # repo; full Linux local-STT runtime is tracked in LINUX-02 (#469) and the
  # model-cache work in #213/#218. Branch protection MUST NOT require this
  # context — see verification-evidence/ci/CI-02-required-checks.md §2.4.
  linux-local-stt:
    name: Linux local-stt compile (allowed-fail)
    runs-on: ubuntu-22.04
    # reason: Advisory only per CI-02 acceptance ("split into required/
    # advisory jobs"). The whisper.cpp / bindgen native toolchain on hosted
    # Linux runners is not yet stabilised; failures here surface regressions
    # without blocking PR merges. Branch protection must NOT add this
    # context — see CI-02-required-checks.md §2.4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake libclang-dev clang pkg-config
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci02-local-stt-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build --features local-stt (--locked)
        run: cargo build --locked --bins --features local-stt

  # ── CI-02 Linux local-mt compile (Issue #475) — ADVISORY ───────────────────
  # Compiles the `local-mt` feature on Linux to detect ort/sentencepiece
  # regressions. Same allowed-fail rationale as `linux-local-stt`; ORT runtime
  # bootstrap is tracked under LINUX-02 (#469) and #218.
  linux-local-mt:
    name: Linux local-mt compile (allowed-fail)
    runs-on: ubuntu-22.04
    # reason: Advisory only per CI-02 acceptance. ORT / sentencepiece native
    # runtime bootstrap on Linux is not stable enough for a required gate;
    # failures here are early-warning signal only. Branch protection must
    # NOT add this context — see CI-02-required-checks.md §2.4.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install native build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential cmake pkg-config
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci02-local-mt-${{ hashFiles('**/Cargo.lock') }}
      - name: cargo build --features local-mt (--locked)
        run: cargo build --locked --bins --features local-mt

  # ── CI-01 cross-platform matrix (Issue #461) ────────────────────────────────
  # New required gates that prove the default-feature build compiles and runs
  # binary unit tests on Windows + macOS-14 (Apple silicon).
  # All jobs use `--locked` so any tampering of `Cargo.lock` fails the gate.
  # Required-check names are documented in
  # verification-evidence/ci/CI-01-required-checks.md §2.3.
  #
  # NOTE (PR #512 queue-mitigation, 2026-05-25): `macos-13` was removed from
  # this matrix after the GitHub-hosted `macos-13` runner pool kept these jobs
  # queued for >19 hours, indefinitely blocking PR #512. The decision is a
  # deliberate matrix change (NOT a claim that macOS-13 passed). Apple-silicon
  # coverage is retained via `macos-14`. Rationale and audit trail:
  # verification-evidence/waves/wave-1/pr512-ci-macos13-queue-mitigation.md.
  cross-platform:
    name: Cross-platform build (${{ matrix.os }}, ${{ matrix.feature }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-22.04, ubuntu-24.04]
        feature: [default]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci01-xplat-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug, --locked, default features)
        run: cargo build --locked --bins
      - name: Run binary unit tests (skip real_api)
        run: cargo test --locked --bins -- --nocapture --skip real_api

  # ── CI-01 feature matrix (Issue #461) ───────────────────────────────────────
  # Compiles the hardware-free optional feature flags on Windows + the macOS-14
  # runner. `audio-integration` and `production-audio` are no-op feature
  # gates (no extra deps) so they compile cleanly without external toolchains.
  # `local-stt` and `local-mt` are explicitly NOT included here because they
  # pull whisper-rs / ort which require platform-specific native toolchains
  # outside the scope of this issue.
  #
  # NOTE (PR #512 queue-mitigation, 2026-05-25): `macos-13` was removed from
  # this matrix alongside the cross-platform matrix above. See the comment on
  # `cross-platform:` and
  # verification-evidence/waves/wave-1/pr512-ci-macos13-queue-mitigation.md.
  feature-matrix:
    name: Feature matrix (${{ matrix.os }}, ${{ matrix.feature }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14, ubuntu-22.04]
        feature: [audio-integration, production-audio]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci01-feat-${{ matrix.feature }}-${{ hashFiles('**/Cargo.lock') }}
      - name: Build with feature (--locked)
        run: cargo build --locked --bins --features ${{ matrix.feature }}
      - name: Compile feature-gated tests (no run)
        run: cargo test --locked --no-run --features ${{ matrix.feature }}

  # ── CI-01 MSRV gate (Issue #461) ────────────────────────────────────────────
  # Enforces the `rust-version` declared in Cargo.toml (1.88 as of
  # CI-01). Runs `--locked` so MSRV regressions and Cargo.lock tampering both
  # surface as a red required check.
  msrv:
    name: MSRV (Rust 1.88) build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci01-msrv-${{ hashFiles('**/Cargo.lock') }}
      - name: Build with MSRV toolchain (--locked)
        run: cargo build --locked --bins

  # ── CI-01 beta toolchain (Issue #461) — ALLOWED-FAIL ────────────────────────
  # Documented allowed-fail per issue #461 acceptance: "Beta toolchain failure
  # is allowed-fail only where documented". Branch protection MUST NOT require
  # this context — see verification-evidence/ci/CI-01-required-checks.md §2.4.
  beta-allowed-fail:
    name: Beta toolchain (allowed-fail)
    runs-on: windows-latest
    # reason: Beta is an early-warning signal only. Issue #461 acceptance
    # explicitly allows this job to fail without failing the workflow run,
    # and CI-01-required-checks.md §2.4 forbids adding this context to
    # branch protection. Failures here surface nightly toolchain regressions
    # without blocking PR merges on stable.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@beta
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-ci01-beta-${{ hashFiles('**/Cargo.lock') }}
      - name: Build on beta toolchain
        run: cargo build --bins
