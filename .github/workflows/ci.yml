name: CI

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Format ──────────────────────────────────────────────────────────────────
  fmt:
    name: Format check (rustfmt)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── Lint ────────────────────────────────────────────────────────────────────
  clippy:
    name: Lint (clippy)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Run clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ── Build & Test ─────────────────────────────────────────────────────────────
  test:
    name: Build and test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug)
        run: cargo build --all-targets
      - name: Build (release)
        run: cargo build --release
      - name: Run tests
        run: cargo test --all-targets -- --nocapture

  # ── Linux smoke ─────────────────────────────────────────────────────────────
  # We also build on Linux so that CI does not fail if a contributor uses
  # a non-Windows machine.  Audio capture tests are excluded; they need
  # real Windows hardware.
  linux-smoke:
    name: Linux build smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
      - name: Build (debug)
        run: cargo build --all-targets
      - name: Run unit tests (no audio)
        run: cargo test --all-targets -- --nocapture
