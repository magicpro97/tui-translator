name: Release

# The job builds the Windows MSVC static binary, packages both a portable zip
# and a per-user Windows installer, and publishes them as a GitHub Release
# pre-release until Layer 5 human-acceptance is completed by named reviewers.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-windows:
    name: Build and publish Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Run release safety tests
        run: cargo test --locked --bin tui-translator

      - name: Build release exe (MSVC static target)
        run: cargo build --locked --release --target x86_64-pc-windows-msvc --bin tui-translator

      - name: Verify no VC++ runtime DLLs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }
          $vsPath  = & $vswhere -latest -products * `
                       -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
                       -property installationPath
          if (-not $vsPath) {
            throw "vswhere did not return a Visual Studio installation path"
          }
          $dumpbin = Join-Path $vsPath "VC\Tools\MSVC" |
                     Get-ChildItem -Directory | Sort-Object Name -Descending |
                     Select-Object -First 1 |
                     ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\dumpbin.exe" }
          if (-not $dumpbin -or -not (Test-Path $dumpbin)) {
            throw "dumpbin.exe not found under Visual Studio installation at $vsPath"
          }
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected release executable not found at $exe"
          }
          Write-Host "Using dumpbin at: $dumpbin"
          $raw = & $dumpbin /DEPENDENTS $exe 2>&1
          if ($LASTEXITCODE -ne 0) { throw "dumpbin failed: $($raw -join ' ')" }
          Write-Host "Dependent DLLs reported by dumpbin:"
          $raw | ForEach-Object { Write-Host $_ }
          $banned = $raw | Select-String -Pattern "vcruntime140|msvcp140" -CaseSensitive:$false
          if ($banned) { throw "Banned VC++ runtime DLLs found: $banned" }
          Write-Host "PASS: no vcruntime140.dll or msvcp140.dll found."

      - name: Package release zip
        id: package
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $zipName = "tui-translator-${tag}-x86_64-pc-windows-msvc.zip"
          $stage   = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\tui-translator.exe" "$stage\"
          Copy-Item "config.example.json" "$stage\"
          Copy-Item "USAGE.md" "$stage\"
          Compress-Archive -Path "$stage\*" -DestinationPath $zipName -CompressionLevel Optimal
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
          Write-Host "Packaged: $zipName  ($size MB)"
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        run: choco install innosetup --version=6.3.3 --yes --no-progress

      - name: Build Windows installer
        id: installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $appVersion = if ($tag.StartsWith('v')) { $tag.Substring(1) } else { $tag }
          $script = "packaging\windows\tui-translator.iss"
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $script)) {
            throw "Installer script not found at $script"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc "/DAppVersion=$appVersion" "/DReleaseTag=$tag" "/DOutputDir=$PWD\installer-dist" $script
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC exited with code $LASTEXITCODE"
          }
          $installerName = "tui-translator-$tag-setup.exe"
          $installerPath = Join-Path $PWD "installer-dist\$installerName"
          if (-not (Test-Path $installerPath)) {
            throw "Expected installer not found at $installerPath"
          }
          $size = [math]::Round((Get-Item $installerPath).Length / 1MB, 2)
          Write-Host "Built installer: $installerName  ($size MB)"
          echo "installer_name=installer-dist/$installerName" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub Release (pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Windows pre-release"
          prerelease: true
          body: |
            ## Windows pre-release

            > **⚠️ This build is published as a pre-release, not a final stable release.**
            > The full v1 runtime is merged on `main`, but Layer 5
            > human-acceptance review (issues #115–#122) has **not** been completed.
            > Keep this build in evaluator / early-adopter use until that gate is signed off.
            > This release is published so users can download a packaged Windows build
            > while that final human-review gate remains pending.

            ### What works in this build

            - WASAPI loopback audio capture from the current Windows playback device
            - Google Speech-to-Text, Google Translation, and optional Google Text-to-Speech
            - Bilingual subtitle display, cost tracking, and runtime keyboard controls
            - A portable zip and a per-user Windows installer are both published
            - Configuration loaded from `config.json` in the same folder as the `.exe`
            - No Visual C++ Redistributable required — the CRT is statically linked.

            ### What is still pending before a final stable release

            | Item | Status |
            |------|--------|
            | Layer 5 human acceptance (issues #115–#122) | Pending named human reviewers |
            | Final stable release promotion | Blocked on Layer 5 completion |

            ### Quick start

            1. Download either `tui-translator-${{ github.ref_name }}-setup.exe` (recommended)
               or `tui-translator-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip`.
            2. If you use the installer, run it and keep the default per-user install path.
               It installs `tui-translator.exe`, `config.example.json`, `USAGE.md`, and creates
               an initial `config.json` if one does not already exist.
            3. If you use the zip, extract it to any folder (for example `C:\Tools\tui-translator\`)
               and copy `config.example.json` to `config.json`.
            4. Fill in your Google API key in `config.json`.
            5. Launch `tui-translator.exe` from the install folder, Start Menu shortcut, or extracted zip folder.
            6. Join or start your Zoom meeting. The app listens to the default Windows
               playback device, so keep Zoom audio routed through that output.
            7. Press `q` to close cleanly.

            Full setup guide: [USAGE.md](https://github.com/magicpro97/tui-translator/blob/${{ github.ref_name }}/USAGE.md)

            ### Keyboard shortcuts

            | Key | Action |
            |-----|--------|
            | Space | Pause / resume |
            | L | Change target language |
            | T | Toggle TTS audio |
            | M | Toggle metrics panel |
            | R | Reload config |
            | ? | Help |
            | Q / Ctrl+C | Quit |
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.installer.outputs.installer_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
