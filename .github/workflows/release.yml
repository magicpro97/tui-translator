name: Release

# The job builds the Windows MSVC static binary, packages both a portable zip
# and a per-user Windows installer, and publishes them as a GitHub Release
# pre-release until Layer 5 human-acceptance is completed by named reviewers.
on:
  push:
    tags:
      - "v*"

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # Tell ort-sys to download the prebuilt ORT binary at build time.
  # Combined with ort/download-binaries + ort/copy-dylibs features in
  # release-windows, this ensures the ORT dll lands next to the binary.
  ORT_STRATEGY: download

jobs:
  build-windows:
    name: Build and publish Windows release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo registry and build artifacts
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-release-${{ hashFiles('**/Cargo.lock') }}

      - name: Guard — verify release build includes local-model features
        shell: pwsh
        run: |
          # Prevent regression: ensure this workflow still passes --features local-
          # to the release build and test steps (test-leader requirement).
          $content = Get-Content ".github/workflows/release.yml" -Raw
          if ($content -notmatch '--features (local-|release-)') {
            throw "Regression guard FAILED: release.yml has no --features local-* or release-* flag"
          }
          Write-Host "PASS: local-model features are present in release.yml"

      - name: Run release safety tests
        run: cargo test --locked --bin tui-translator --features local-stt,local-mt,local-tts,local-llm-mt,ort/download-binaries,ort/tls-native

      - name: Build release exe (MSVC static target)
        run: cargo build --locked --release --target x86_64-pc-windows-msvc --bin tui-translator --features release-windows

      - name: Verify no VC++ runtime DLLs
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          if (-not (Test-Path $vswhere)) {
            throw "vswhere.exe not found at $vswhere"
          }
          $vsPath  = & $vswhere -latest -products * `
                       -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 `
                       -property installationPath
          if (-not $vsPath) {
            throw "vswhere did not return a Visual Studio installation path"
          }
          $dumpbin = Join-Path $vsPath "VC\Tools\MSVC" |
                     Get-ChildItem -Directory | Sort-Object Name -Descending |
                     Select-Object -First 1 |
                     ForEach-Object { Join-Path $_.FullName "bin\Hostx64\x64\dumpbin.exe" }
          if (-not $dumpbin -or -not (Test-Path $dumpbin)) {
            throw "dumpbin.exe not found under Visual Studio installation at $vsPath"
          }
          $exe = "target\x86_64-pc-windows-msvc\release\tui-translator.exe"
          if (-not (Test-Path $exe)) {
            throw "Expected release executable not found at $exe"
          }
          Write-Host "Using dumpbin at: $dumpbin"
          $raw = & $dumpbin /DEPENDENTS $exe 2>&1
          if ($LASTEXITCODE -ne 0) { throw "dumpbin failed: $($raw -join ' ')" }
          Write-Host "Dependent DLLs reported by dumpbin:"
          $raw | ForEach-Object { Write-Host $_ }
          $banned = $raw | Select-String -Pattern "vcruntime140|msvcp140" -CaseSensitive:$false
          if ($banned) { throw "Banned VC++ runtime DLLs found: $banned" }
          Write-Host "PASS: no vcruntime140.dll or msvcp140.dll found."

      - name: Package release zip
        id: package
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $zipName = "tui-translator-${tag}-x86_64-pc-windows-msvc.zip"
          $stage   = "release-stage"
          New-Item -ItemType Directory -Force -Path $stage | Out-Null
          Copy-Item "target\x86_64-pc-windows-msvc\release\tui-translator.exe" "$stage\"
          Copy-Item "config.example.json" "$stage\"
          Copy-Item "USAGE.md" "$stage\"
          Copy-Item "LICENSE" "$stage\"
          # Bundle ORT runtime dll (placed next to the binary by ort/copy-dylibs)
          $ortDll = Get-ChildItem -Path "target\x86_64-pc-windows-msvc\release" `
                      -Filter "onnxruntime*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          if (-not $ortDll) {
            # Fallback: search entire target tree (ort download-binaries may put it in build/ output)
            $ortDll = Get-ChildItem -Path "target" -Recurse `
                        -Filter "onnxruntime*.dll" -ErrorAction SilentlyContinue | Select-Object -First 1
          }
          if ($ortDll) {
            Copy-Item $ortDll.FullName "$stage\"
            Write-Host "Bundled ORT runtime: $($ortDll.Name)  ($([math]::Round($ortDll.Length/1MB,2)) MB)"
          } else {
            Write-Host "::warning::ORT dll not found in build output — local model features require it at runtime"
          }
          # Bundle third-party model/runtime licenses so offline users have attribution
          $licDir = "$stage\LICENSES"
          New-Item -ItemType Directory -Force -Path $licDir | Out-Null
          Copy-Item "assets\licenses\*" "$licDir\"
          Compress-Archive -Path "$stage\*" -DestinationPath $zipName -CompressionLevel Optimal
          $size = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
          Write-Host "Packaged: $zipName  ($size MB)"
          echo "zip_name=$zipName" >> $env:GITHUB_OUTPUT

      - name: Package PDB symbol bundle (QA8-08 / #506)
        id: pdb
        shell: pwsh
        run: |
          # The MSVC linker writes tui-translator.pdb next to the .exe
          # even though release `strip = true` removes line info from
          # the binary itself. Ship the PDB as a separate Release
          # asset so support engineers can symbolicate WER minidumps
          # without bloating the end-user zip. See
          # docs/13-crash-dump-symbolication.md for the workflow.
          $tag    = "${{ github.ref_name }}"
          $pdbSrc = "target\x86_64-pc-windows-msvc\release\tui-translator.pdb"
          if (-not (Test-Path $pdbSrc)) {
            Write-Host "::warning::tui-translator.pdb not found at $pdbSrc; skipping symbol bundle"
            echo "pdb_name=" >> $env:GITHUB_OUTPUT
            exit 0
          }
          $pdbZip = "tui-translator-${tag}-pdb.zip"
          Compress-Archive -Path $pdbSrc -DestinationPath $pdbZip -CompressionLevel Optimal -Force
          $size = [math]::Round((Get-Item $pdbZip).Length / 1MB, 2)
          Write-Host "Packaged PDB bundle: $pdbZip  ($size MB)"
          echo "pdb_name=$pdbZip" >> $env:GITHUB_OUTPUT

      - name: Upload PDB workflow artefact (QA8-08 / #506)
        if: steps.pdb.outputs.pdb_name != ''
        uses: actions/upload-artifact@v4
        with:
          name: tui-translator-pdb-${{ github.ref_name }}
          path: ${{ steps.pdb.outputs.pdb_name }}
          retention-days: 90
          if-no-files-found: error

      - name: Ensure Inno Setup compiler is available
        id: inno
        shell: pwsh
        run: |
          $innoSetupVersion = "6.5.4"

          function Find-Iscc {
            $command = Get-Command iscc.exe -ErrorAction SilentlyContinue
            if ($command) {
              return $command.Path
            }

            $candidates = @(
              "${env:ProgramFiles(x86)}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 7\ISCC.exe",
              "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
            )

            foreach ($candidate in $candidates) {
              if ($candidate -and (Test-Path $candidate)) {
                return $candidate
              }
            }

            return $null
          }

          $iscc = Find-Iscc
          if (-not $iscc) {
            choco install innosetup --version $innoSetupVersion --yes --no-progress
            $iscc = Find-Iscc
          }

          if (-not $iscc) {
            throw "ISCC.exe not found after installing Inno Setup"
          }

          Write-Host "Using ISCC at: $iscc"
          echo "iscc_path=$iscc" >> $env:GITHUB_OUTPUT

      - name: Build Windows installer
        id: installer
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $appVersion = if ($tag.StartsWith('v')) { $tag.Substring(1) } else { $tag }
          $script = "packaging\windows\tui-translator.iss"
          $iscc = "${{ steps.inno.outputs.iscc_path }}"
          if (-not (Test-Path $script)) {
            throw "Installer script not found at $script"
          }
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe not found at $iscc"
          }
          & $iscc "/DAppVersion=$appVersion" "/DReleaseTag=$tag" "/DOutputDir=$PWD\installer-dist" $script
          if ($LASTEXITCODE -ne 0) {
            throw "ISCC exited with code $LASTEXITCODE"
          }
          $installerName = "tui-translator-$tag-setup.exe"
          $installerPath = Join-Path $PWD "installer-dist\$installerName"
          if (-not (Test-Path $installerPath)) {
            throw "Expected installer not found at $installerPath"
          }
          $size = [math]::Round((Get-Item $installerPath).Length / 1MB, 2)
          Write-Host "Built installer: $installerName  ($size MB)"
          echo "installer_name=installer-dist/$installerName" >> $env:GITHUB_OUTPUT

      - name: Generate SHA256SUMS (JV-18 / #426)
        id: checksums
        shell: pwsh
        run: |
          # Compute SHA-256 for every release artifact and write a BSD-style
          # SHA256SUMS file so users can verify download integrity offline.
          $tag   = "${{ github.ref_name }}"
          $outFile = "SHA256SUMS-${tag}.txt"
          $artifacts = @(
            "${{ steps.package.outputs.zip_name }}",
            "${{ steps.installer.outputs.installer_name }}"
          )
          if ("${{ steps.pdb.outputs.pdb_name }}" -ne "") {
            $artifacts += "${{ steps.pdb.outputs.pdb_name }}"
          }
          $lines = @()
          foreach ($path in $artifacts) {
            if (Test-Path $path) {
              $hash = (Get-FileHash -Algorithm SHA256 $path).Hash.ToLower()
              $name = Split-Path $path -Leaf
              $lines += "SHA256 ($name) = $hash"
              Write-Host "  $hash  $name"
            } else {
              Write-Host "::warning::Artifact not found for checksum: $path"
            }
          }
          $lines | Set-Content -Encoding UTF8 $outFile
          Write-Host "Written: $outFile"
          echo "checksums_name=$outFile" >> $env:GITHUB_OUTPUT

      - name: Validate release artifacts (JV-18 / #426)
        shell: pwsh
        run: |
          # Lightweight artifact gate: confirm the zip contains required files
          # and that SHA256SUMS was generated successfully.
          $zip  = "${{ steps.package.outputs.zip_name }}"
          $inst = "${{ steps.installer.outputs.installer_name }}"
          $sums = "${{ steps.checksums.outputs.checksums_name }}"
          $errors = @()

          # 1. Zip must exist and be non-empty
          if (-not (Test-Path $zip)) {
            $errors += "Release zip not found: $zip"
          } elseif ((Get-Item $zip).Length -lt 500KB) {
            $errors += "Release zip suspiciously small ($((Get-Item $zip).Length) bytes): $zip"
          }

          # 2. Installer must exist and be non-empty
          if (-not (Test-Path $inst)) {
            $errors += "Installer not found: $inst"
          } elseif ((Get-Item $inst).Length -lt 500KB) {
            $errors += "Installer suspiciously small ($((Get-Item $inst).Length) bytes): $inst"
          }

          # 3. SHA256SUMS must exist and cover at least 2 artifacts
          if (-not (Test-Path $sums)) {
            $errors += "SHA256SUMS file not generated: $sums"
          } else {
            $lineCount = (Get-Content $sums | Measure-Object -Line).Lines
            if ($lineCount -lt 2) {
              $errors += "SHA256SUMS has only $lineCount line(s); expected ≥ 2"
            }
          }

          # 4. Zip must contain exe, LICENSE, USAGE.md, LICENSES/ directory
          $zipContents = [System.IO.Compression.ZipFile]::OpenRead((Resolve-Path $zip).Path)
          try {
            $entries = $zipContents.Entries | ForEach-Object { $_.FullName }
            $required = @("tui-translator.exe", "LICENSE", "USAGE.md")
            foreach ($req in $required) {
              if (-not ($entries -like "*$req*")) {
                $errors += "Zip missing required file: $req"
              }
            }
            if (-not ($entries -like "LICENSES/*")) {
              $errors += "Zip missing LICENSES/ directory with third-party attributions"
            }
          } finally {
            $zipContents.Dispose()
          }

          if ($errors.Count -gt 0) {
            Write-Host "::error::Artifact validation FAILED:"
            $errors | ForEach-Object { Write-Host "  - $_" }
            exit 1
          }
          Write-Host "PASS: all artifact validation checks passed."

      - name: Publish GitHub Release (pre-release)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "${{ github.ref_name }} — Windows pre-release"
          prerelease: true
          body: |
            ## Windows pre-release

            > **⚠️ This build is published as a pre-release, not a final stable release.**
            > The full v1 runtime is merged on `main`, but Layer 5
            > human-acceptance review (issues #115–#122) has **not** been completed.
            > Keep this build in evaluator / early-adopter use until that gate is signed off.
            > This release is published so users can download a packaged Windows build
            > while that final human-review gate remains pending.

            ### What works in this build

            - WASAPI loopback audio capture from the default or selected Windows playback device
            - Google Speech-to-Text, Google Translation, and optional Google Text-to-Speech
            - Bilingual subtitle display, cost tracking, and runtime keyboard controls
            - A portable zip and a per-user Windows installer are both published
            - First-run setup and per-user config storage under `%USERPROFILE%\.tui-translator`
            - In-app settings include `capture_device` selection; blank keeps the Windows default
            - No Visual C++ Redistributable required — the CRT is statically linked.

            ### What is still pending before a final stable release

            | Item | Status |
            |------|--------|
            | Layer 5 human acceptance (issues #115–#122) | Pending named human reviewers |
            | Code signing (Authenticode) | ⚠️ **Pre-release blocker** — certificate not yet provisioned; Windows SmartScreen will warn on first launch. This is an explicit known issue for pre-release builds. Tracked in #429. |
            | Final stable release promotion | Blocked on Layer 5 completion and code signing |

            ### Checksum verification

            Download `SHA256SUMS-${{ github.ref_name }}.txt` and verify the zip or installer
            before running:

            ```powershell
            # PowerShell — verify the zip
            (Get-FileHash "tui-translator-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip" -Algorithm SHA256).Hash.ToLower()
            # Compare the output with the SHA256 value in SHA256SUMS-${{ github.ref_name }}.txt
            ```

            ### Quick start

            1. Download either `tui-translator-${{ github.ref_name }}-setup.exe` (recommended)
               or `tui-translator-${{ github.ref_name }}-x86_64-pc-windows-msvc.zip`.
            2. If you use the installer, run it and keep the default per-user install path.
               It installs `tui-translator.exe`, `config.example.json`, and `USAGE.md`.
            3. If you use the zip, extract it to any folder (for example `C:\Tools\tui-translator\`).
            4. Launch once and complete First-Run Setup; the app saves config at
               `%USERPROFILE%\.tui-translator\config.json`.
            5. Launch `tui-translator.exe` from the install folder, Start Menu shortcut, or extracted zip folder.
            6. To choose a Zoom playback stream, press `S`, move to `capture_device`,
               then press `F2` or `Ctrl+D`; save and restart.
            7. Join or start your Zoom meeting. The app listens to the selected Windows
               playback device, or the default playback device when `capture_device` is blank.
            8. Press `q` to close cleanly.

            Full setup guide: [USAGE.md](https://github.com/magicpro97/tui-translator/blob/${{ github.ref_name }}/USAGE.md)

            ### Keyboard shortcuts

            | Key | Action |
            |-----|--------|
            | Space | Pause / resume |
            | L | Change target language |
            | T | Toggle TTS audio |
            | M | Toggle metrics panel |
            | S | Open settings |
            | F2 / Ctrl+D in settings | Cycle capture devices |
            | R | Reload config |
            | ? | Help |
            | Q / Ctrl+C | Quit |
          files: |
            ${{ steps.package.outputs.zip_name }}
            ${{ steps.installer.outputs.installer_name }}
            ${{ steps.checksums.outputs.checksums_name }}
            ${{ steps.pdb.outputs.pdb_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
