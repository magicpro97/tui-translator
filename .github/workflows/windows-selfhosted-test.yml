name: Windows selfhosted test

# Verifies the Windows COM teardown fix (issue #723) on a real Windows machine.
# Runs only on push to branches matching the fix-* pattern, and on manual
# dispatch. Does NOT replace the hosted ci.yml workflow — that one keeps
# guarding PRs and main with the same fail-soft toleration that is currently
# shipping. This workflow is the additional safety net while the root-cause
# fix is being validated against a real machine.

on:
  push:
    branches:
      - "fix/**"
      - "ci/**"
  pull_request:
    branches:
      - "fix/**"
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

# Skip the dtolnay/rust-toolchain action on this self-hosted runner because
# the action's default `shell: bash` step resolves the runner's temp dir to
# ổ F: (a drive that does not exist on this machine) and fails before the
# toolchain step runs. The runner already has rustc/cargo on PATH (installed
# via rustup per the runner setup guide), so we invoke cargo directly.

jobs:
  fmt:
    name: Format check
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: cargo fmt --check
        shell: pwsh
        run: cargo fmt --all -- --check

  clippy:
    name: Clippy (all features)
    runs-on: self-hosted
    env:
      CMAKE_MSVC_RUNTIME_LIBRARY: MultiThreaded
      CMAKE_POLICY_DEFAULT_CMP0091: NEW
    steps:
      - uses: actions/checkout@v4
      - name: Install libclang (whisper-rs-sys build dep)
        # whisper-rs-sys 0.10 build.rs invokes bindgen which needs
        # libclang.dll on PATH. Skip if LLVM already installed.
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\LLVM\bin",
            "${env:ProgramFiles(x86)}\LLVM\bin"
          )
          $found = $candidates | Where-Object { Test-Path (Join-Path $_ "libclang.dll") } | Select-Object -First 1
          if ($found) {
            "LIBCLANG_PATH=$found" >> $env:GITHUB_ENV
            "$found" >> $env:GITHUB_PATH
            Write-Host "Using existing LLVM at $found"
            exit 0
          }
          Write-Host "Installing LLVM (libclang missing)..."
          choco install llvm -y --no-progress
          $llvm = "$env:ProgramFiles\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvm "libclang.dll"))) {
            throw "libclang.dll not found after LLVM install"
          }
          "LIBCLANG_PATH=$llvm" >> $env:GITHUB_ENV
          "$llvm" >> $env:GITHUB_PATH
      - name: cargo clippy
        shell: pwsh
        run: cargo clippy --all-targets --all-features -- -D warnings

  test-default:
    name: Test (default features, debug)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: cargo test --bins
        # NOTE: deliberately NO --test-threads=1, NO continue-on-error.
        # If the COM guard fix is in place the binary must exit 0 cleanly.
        # Any STATUS_ACCESS_VIOLATION (0xC0000005) or exit code 1 fails the job.
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          cargo test --bins -- --nocapture --skip real_api

  test-all-features:
    name: Test (all features, debug)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Install libclang (whisper-rs-sys build dep)
        # whisper-rs-sys 0.10 build.rs invokes bindgen which needs
        # libclang.dll on PATH. Skip if LLVM already installed.
        shell: pwsh
        run: |
          $candidates = @(
            "$env:ProgramFiles\LLVM\bin",
            "${env:ProgramFiles(x86)}\LLVM\bin"
          )
          $found = $candidates | Where-Object { Test-Path (Join-Path $_ "libclang.dll") } | Select-Object -First 1
          if ($found) {
            "LIBCLANG_PATH=$found" >> $env:GITHUB_ENV
            "$found" >> $env:GITHUB_PATH
            Write-Host "Using existing LLVM at $found"
            exit 0
          }
          Write-Host "Installing LLVM (libclang missing)..."
          choco install llvm -y --no-progress
          $llvm = "$env:ProgramFiles\LLVM\bin"
          if (-not (Test-Path (Join-Path $llvm "libclang.dll"))) {
            throw "libclang.dll not found after LLVM install"
          }
          "LIBCLANG_PATH=$llvm" >> $env:GITHUB_ENV
          "$llvm" >> $env:GITHUB_PATH
      - name: cargo test --all-features
        # NOTE: deliberately NO --test-threads=1, NO continue-on-error.
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          cargo test --all-features -- --nocapture --skip real_api

  test-release:
    name: Test (release build, smoke)
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: cargo test --release --bins
        # Release-mode smoke; release build was NOT exhibiting the crash per
        # comment in device_watchdog.rs, but verify on real machine anyway.
        shell: pwsh
        run: |
          $env:RUST_BACKTRACE = "1"
          cargo test --release --bins -- --nocapture --skip real_api
